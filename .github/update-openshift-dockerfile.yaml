name: Update OpenShift Dockerfile

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  update-dockerfile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/*.txt

      - name: Install apt dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libjpeg-dev \
            libldap2-dev \
            libsasl2-dev \
            libssl-dev \
            libpq-dev \
            zlib1g-dev \
            default-libmysqlclient-dev \
            libcairo2-dev \
            pkg-config \
            libmagic1

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Generate OpenShift Dockerfile
        run: |
          set -euo pipefail
          python manage.py platform_template docker_dockerfile_openshift > docker/Dockerfile.openshift

      - name: Checkout bcgov/mayan-openshift main
        uses: actions/checkout@v4
        with:
          repository: bcgov/mayan-openshift
          ref: main
          token: ${{ secrets.BCGOV_MAYAN_OPENSHIFT_PAT }}
          path: mayan-openshift

      - name: Copy generated Dockerfile into target repo
        run: |
          set -euo pipefail
          cp docker/Dockerfile.openshift mayan-openshift/docker/Dockerfile.openshift

      - name: Commit and push if changed
        working-directory: mayan-openshift
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add docker/Dockerfile.openshift
          if ! git diff --cached --quiet; then
            git commit -m "chore: update Dockerfile.openshift from template [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
