.job_base_test:
  &job_base_test
  before_script:
    - export APT_STATE_LISTS=${APT_CACHE_DIR}/lists && export APT_CACHE_ARCHIVES=${APT_CACHE_DIR}/archives
    - mkdir -p "${APT_STATE_LISTS}/partial" && mkdir -p "${APT_CACHE_ARCHIVES}/partial"
    - printf "dir::state::lists    ${APT_STATE_LISTS};\ndir::cache::archives    ${APT_CACHE_ARCHIVES};\n" > /etc/apt/apt.conf.d/99gitlab-ci-cache
    - if [ "${APT_PROXY}" ]; then echo "Acquire::http { Proxy \"http://${APT_PROXY}\"; };" > /etc/apt/apt.conf.d/01proxy; fi
    - apt-get update
    - mkdir -p ${PIP_CACHE_DIR}
    - apt-get install --yes --no-install-recommends ca-certificates clamav file fuse ghostscript git gnupg1 graphviz libarchive-zip-perl libfile-mimeinfo-perl libimage-exiftool-perl libmariadb3 libpq5 libreoffice-calc-nogui libreoffice-draw-nogui libreoffice-impress-nogui libreoffice-math-nogui libreoffice-writer-nogui poppler-utils sane-utils sudo supervisor tesseract-ocr g++ gcc libffi-dev libjpeg-dev libldap2-dev libpng-dev libsasl2-dev libssl-dev libtiff-dev make pkg-config zlib1g-dev make python3-dev python3-venv tesseract-ocr-deu
    - python3 -m venv venv
    - . venv/bin/activate
    - make dev-setup-python-essential
    - make dev-setup-python-production
    - make dev-setup-python-testing
  cache:
    - key: apt-cache-4.11
      paths:
        - .cache/apt
    - key: pip-cache-4.11
      paths:
        - .cache/pip
  image: debian:13.3-slim
  only:
    - ci/releases/all/major
    - ci/releases/all/minor
    - ci/releases/docker/major
    - ci/releases/docker/minor
    - ci/releases/python/major
    - ci/releases/python/minor
    - ci/releases/staging/arch/all
    - ci/tests/all
    - ci/tests/python
  stage: stage_test_python
  variables:
    APT_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/apt
    PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip

job_postgres_test:
  << : *job_base_test
  script:
    - apt-get install --yes --no-install-recommends libpq-dev
    - . venv/bin/activate
    - make dev-setup-python-postgresql
    - export MAYAN_DATABASES="{'default':{'ENGINE':'django.db.backends.postgresql','NAME':'mayan','PASSWORD':'mayandbpass','USER':'mayan','HOST':'postgres'}}"
    - make test-all SETTINGS=mayan.settings.testing.gitlab-ci
    - make test-migrations-all SETTINGS=mayan.settings.testing.gitlab-ci
  services:
    - postgres:15.16
  variables:
    APT_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/apt
    PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip
    POSTGRES_DB: "mayan"
    POSTGRES_PASSWORD: "mayandbpass"
    POSTGRES_USER: "mayan"

job_sqlite_test:
  << : *job_base_test
  script:
    - . venv/bin/activate
    - make test-all SETTINGS=mayan.settings.testing.gitlab-ci
    - make test-migrations-all SETTINGS=mayan.settings.testing.gitlab-ci



