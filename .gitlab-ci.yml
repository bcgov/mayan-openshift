

stages:
  - stage_build_python
  - stage_test_python
  - stage_build_container
  - stage_build_documentation
  - stage_push
  - stage_deploy



job_docker_build_all:
  before_script:
    - echo ${APK_CACHE_DIR}
    - mkdir -p ${APK_CACHE_DIR}
    - rm -f /etc/apk/cache
    - ln -s ${APK_CACHE_DIR} /etc/apk/cache
    - apk update
    - apk add cairo gcc libffi-dev libjpeg-turbo-dev libmagic make musl-dev openldap-dev zlib-dev
  cache:
    - key: apk-cache-4.11
      paths:
        - .cache/apk
    - key: pip-cache-4.11
      paths:
        - .cache/pip
  image: docker:29.2.1-cli
  needs:
    - job_docker_build_amd64
    - job_docker_build_arm64
  only:
    - ci/builds/docker/arch/all
    - ci/releases/all/major
    - ci/releases/all/minor
    - ci/releases/docker/major
    - ci/releases/docker/minor
    - ci/releases/nightly
    - ci/releases/staging/arch/all
    - ci/tests/all
    - ci/tests/docker
  script:
    - export DOCKER_IMAGE_NAME="${CI_IMAGE_NAME}"
    - export DOCKER_REGISTRY_NAME="${CI_REGISTRY}"
    - export DOCKER_REGISTRY_PASSWORD="${CI_REGISTRY_PUSH_PASSWORD}"
    - export DOCKER_REGISTRY_USERNAME="${CI_REGISTRY_PUSH_USER}"
    - make docker-manifest-create
    - make docker-manifest-push
  services:
    - docker:29.2.1-dind
  stage: stage_build_container
  variables:
    DOCKER_DRIVER: overlay2
    APK_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/apk
    PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip

