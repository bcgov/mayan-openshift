job_documentation_build:
  artifacts:
    expire_in: 24 hr
    paths:
    - docs
  before_script:
    - export APT_STATE_LISTS=${APT_CACHE_DIR}/lists && export APT_CACHE_ARCHIVES=${APT_CACHE_DIR}/archives
    - mkdir -p "${APT_STATE_LISTS}/partial" && mkdir -p "${APT_CACHE_ARCHIVES}/partial"
    - printf "dir::state::lists    ${APT_STATE_LISTS};\ndir::cache::archives    ${APT_CACHE_ARCHIVES};\n" > /etc/apt/apt.conf.d/99gitlab-ci-cache
    - if [ "${APT_PROXY}" ]; then echo "Acquire::http { Proxy \"http://${APT_PROXY}\"; };" > /etc/apt/apt.conf.d/01proxy; fi
    - apt-get update
    - mkdir -p ${PIP_CACHE_DIR}
    - apt-get install --yes --no-install-recommends enchant-2 graphviz libcairo2 g++ gcc libffi-dev libjpeg-dev libldap2-dev libpng-dev libsasl2-dev libssl-dev libtiff-dev make pkg-config zlib1g-dev make python3-dev python3-venv
    - python3 -m venv venv
    - . venv/bin/activate
    - make dev-setup-python-essential
  cache:
    - key: apt-cache-4.11
      paths:
        - .cache/apt
    - key: pip-cache-4.11
      paths:
        - .cache/pip
  image: debian:13.3-slim
  only:
    - ci/builds/documentation
    - ci/releases/all/major
    - ci/releases/documentation
    - ci/tests/all
  script:
    - make dev-setup-python-production
    - make dev-setup-python-documentation
    - make docs-html
  stage: stage_build_documentation
  variables:
    APT_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/apt
    PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip

job_documentation_push:
  before_script:
    - export APT_STATE_LISTS=${APT_CACHE_DIR}/lists && export APT_CACHE_ARCHIVES=${APT_CACHE_DIR}/archives
    - mkdir -p "${APT_STATE_LISTS}/partial" && mkdir -p "${APT_CACHE_ARCHIVES}/partial"
    - printf "dir::state::lists    ${APT_STATE_LISTS};\ndir::cache::archives    ${APT_CACHE_ARCHIVES};\n" > /etc/apt/apt.conf.d/99gitlab-ci-cache
    - if [ "${APT_PROXY}" ]; then echo "Acquire::http { Proxy \"http://${APT_PROXY}\"; };" > /etc/apt/apt.conf.d/01proxy; fi
    - apt-get update
    - mkdir --parents ~/.ssh
    - chmod 700 ~/.ssh
    - echo "${DOCUMENTATION_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - 'which ssh-agent || ( apt-get update --yes && apt-get install --yes --no-install-recommends openssh-client rsync )'
    - eval $(ssh-agent -s)
    - echo "${DOCUMENTATION_SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add - > /dev/null
  cache:
    - key: apt-cache-4.11
      paths:
        - .cache/apt
    - key: pip-cache-4.11
      paths:
        - .cache/pip
  image: debian:13.3-slim
  only:
    - ci/releases/all/major
    - ci/releases/documentation
  script:
    - export REMOTE_SSH_USERNAME="${DOCUMENTATION_SSH_USERNAME}"
    - export REMOTE_SSH_HOSTNAME="${DOCUMENTATION_HOSTNAME}"
    - export REMOTE_DOCUMENTATION_PATH="${DOCUMENTATION_SERVER_PATH}"
    - make devops-documentation-deploy
  stage: stage_push
  variables:
    APT_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/apt
    PIP_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/pip



